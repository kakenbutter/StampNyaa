<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>スタンプにゃあ～ | StampNyaa</title>
    <link rel="stylesheet" href="../dist/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="app">
      <div id="titlebar">
        <div class="dragzone"></div>
        <div class="logo">スタンプにゃあ～ | StampNyaa</div>
        <div id="menu-buttons">
          <div id="close-button" class="menu-button">
            <i class="fa-solid fa-xmark fa-canvas-square"></i>
          </div>
        </div>
      </div>

      <div id="main-content">
        <div id="leftbar">
          <div id="top-buttons">
            <div id="settings-button" class="button">
              <i class="fa-solid fa-gear fa-canvas-square"></i>
            </div>
            <div id="most-used-icon" class="button">
              <i class="fa-solid fa-clock-rotate-left fa-canvas-square"></i>
            </div>
            <div id="add-button" class="button">
              <i class="fa-solid fa-plus fa-canvas-square"></i>
            </div>
            <div id="favorites-icon" class="button">
              <i class="fa-solid fa-star fa-canvas-square"></i>
            </div>
          </div>
          <div id="sticker-pack-list"></div>
        </div>
        <div id="sticker-list"></div>
      </div>
    </div>

    <div id="add-sticker-background" class="modal-background" style="display: none">
      <div id="add-sticker-modal" class="modal">
        <div class="inputbox box">
          <input
            id="add-sticker-input"
            type="text"
            spellcheck="false"
            placeholder="https://store.line.me/stickershop/product/123456789/ja"
          />
        </div>
        <div id="add-sticker-button" class="box">
          <i class="fa-solid fa-check fa-canvas-square"></i>
        </div>
        <div id="add-sticker-download-feedback" style="display: none">
          <h2 id="add-sticker-title"></h2>
          <div id="download-progress-bar">
            <div id="download-progress">
              <span id="progress-text"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="settings-background" class="modal-background" style="display: none">
      <div id="settings-modal" class="modal">
        <!-- Theme select -->
        <div class="settingsRow">
          <div class="icons">
            <i class="fa-solid fa-palette fa-canvas-square"></i>
          </div>
          <div id="theme-select">
            <div data-theme="blue" class="themeSelector"></div>
            <div data-theme="pink" class="themeSelector"></div>
            <div data-theme="dracula" class="themeSelector"></div>
            <div data-theme="night-pink" class="themeSelector"></div>
          </div>
        </div>
        <!-- Set hotkey -->
        <div class="settingsRow">
          <div class="icons">
            <i class="fa-solid fa-keyboard fa-canvas-square"></i>
          </div>
          <div id="hotkey-input-container" class="inputbox">
            <input id="hotkey-input" type="text" spellcheck="false" />
          </div>
        </div>

        <!-- Run on startup -->
        <div class="settingsRow">
          <div class="icons">
            <i class="fa-solid fa-rocket fa-canvas-square"></i>
          </div>
          <div>
            <h2>Run on Startup</h2>
          </div>
          <div id="run-on-startup">
            <i id="run-on-startup-check" class="fa-solid fa-check fa-canvas-square"></i>
          </div>
        </div>

        <!-- Fit to width -->
        <div class="settingsRow">
          <div class="icons">
            <i class="fa-solid fa-image fa-canvas-square"></i>
          </div>
          <div>
            <h2>Fit to Width</h2>
          </div>
          <div class="rightSideContainer">
            <input id="fit-to-width-input" type="number" />
          </div>
        </div>

        <div class="settingsRow divider"></div>

        <a href="https://github.com/kakenbutter/StampNyaa" target="_blank" class="settingsRow credits">
          <div>
            <img src="../assets/icon.ico" alt="StampNyaa Icon" />
          </div>
          <div>
            <h2 id="versionString"></h2>
          </div>
          <div class="icons">
            <i class="fa-solid fa-heart fa-canvas-square"></i>
          </div>
          <div>
            <h2>by MarvNC and kakenbutter</h2>
          </div>
          <div>
            <img src="../assets/github-mark/github-mark-white.svg" alt="GitHub icon" />
          </div>
        </a>
      </div>
    </div>

    <!-- update modal -->
    <div id="update-background" class="modal-background" style="display: none">
      <div id="version-modal" class="modal">
        <div class="updateIcons">
          <img src="../assets/icon.ico" alt="StampNyaa Icon" class="icon" />
        </div>
        <div><h2 id="update-text"></h2></div>
        <a
          id="update-button"
          class="greenbutton"
          target="_blank"
          href="https://github.com/kakenbutter/StampNyaa/releases"
        >
          <i class="fa-solid fa-check fa-canvas-square"></i>
        </a>
      </div>
    </div>
    <div id="add-favorite-feedback" class="feedback-modal">
      <i class="fa-solid fa-image fa-canvas-square"></i>
      <i class="fa-solid fa-plus fa-canvas-square"></i>
    </div>
    <div id="remove-favorite-feedback" class="feedback-modal">
      <i class="fa-solid fa-image fa-canvas-square"></i>
      <i class="fa-solid fa-trash fa-canvas-square"></i>
    </div>
    <script src="../dist/renderer/bundle.js"></script>
  </body>
</html>
